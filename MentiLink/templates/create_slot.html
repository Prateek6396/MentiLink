{% extends "base.html" %}

{% block title %}Create New Slot - MentiLink{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header">
                <h2 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Create a New Mentoring Slot</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="start_time" class="form-label">Session Start Time (IST)</label>
                        <input type="datetime-local" class="form-control" id="start_time" name="start_time" required>
                        <div class="form-text">Please select the time in your local Indian Standard Time.</div>
                    </div>

                    <div class="mb-3">
                        <label for="duration" class="form-label">Duration (in minutes)</label>
                        <input type="number" class="form-control" id="duration" name="duration" value="60" required>
                    </div>

                    <hr>
                    
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="is_recurring" id="is_recurring">
                        <label class="form-check-label" for="is_recurring">
                            Repeat this slot weekly
                        </label>
                    </div>

                    <div class="mb-3">
                        <label for="repeat_count" class="form-label">Number of weeks to repeat</label>
                        <input type="number" class="form-control" id="repeat_count" name="repeat_count" min="1" max="10" value="4">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Create Slot(s)</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
